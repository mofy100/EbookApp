<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青空文庫リーダー</title>
    <link rel="stylesheet" href="index.css?v=1">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <!-- 検索・一覧画面 -->
        <main id="search-view" class="view active">
            <header>
                <h1>青空文庫リーダー</h1>
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="タイトルや著者名で検索...">
                    <label class="checkbox-label">
                        <input type="checkbox" id="downloaded-only"> ダウンロード済みのみ
                    </label>
                    <button id="search-button">検索</button>
                </div>
            </header>
            <div id="book-list" class="book-grid"></div>
            <div class="pagination">
                <button id="prev-page" disabled>前へ</button>
                <span id="page-info"></span>
                <button id="next-page">次へ</button>
            </div>
        </main>


    </div>
    <script src="js/app.js?v=2"></script>
</body>

</html>
