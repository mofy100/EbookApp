<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青空文庫リーダー</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- 検索・一覧画面 -->
        <main id="search-view" class="view active">
            <header>
                <h1>青空文庫リーダー</h1>
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="タイトルや著者名で検索...">
                    <label class="checkbox-label">
                        <input type="checkbox" id="downloaded-only"> ダウンロード済みのみ
                    </label>
                    <button id="search-button">検索</button>
                </div>
            </header>
            <div id="book-list" class="book-grid"></div>
            <div class="pagination">
                <button id="prev-page" disabled>前へ</button>
                <span id="page-info"></span>
                <button id="next-page">次へ</button>
            </div>
        </main>

        <!-- 読書ビューア画面 -->
        <main id="reader-view" class="view">
            <header class="reader-header">
                <button id="back-button">← 戻る</button>
                <h2 id="reader-title">タイトル</h2>
            </header>
            <div class="reader-container">
                <div id="reader-content" class="vertical-text"></div>
            </div>
        </main>
    </div>
    <script src="/app.js"></script>
</body>
</html>
