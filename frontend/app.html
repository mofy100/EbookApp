<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青空文庫リーダー</title>
    <link rel="stylesheet" href="app.css?v=4">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <main id="search-view" class="view active">
            <header>
                <h1>青空文庫リーダー</h1>
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="タイトルや著者名で検索...">
                    <button id="search-button">検索</button>
                    <button id="filter-open-btn">絞り込む</button>
                </div>
            </header>

            <div class="content-layout">
                <!-- 左：作品リスト -->
                <div class="list-column">
                    <div id="book-list" class="book-list"></div>
                    <div class="pagination">
                        <button id="prev-page" disabled>前へ</button>
                        <span id="page-info"></span>
                        <button id="next-page">次へ</button>
                    </div>
                </div>

                <!-- 中央：選択中の作品詳細 -->
                <aside id="detail-panel">
                    <button id="mobile-back-btn">← 一覧に戻る</button>
                    <div id="detail-placeholder">
                        <p>作品を選択すると<br>詳細が表示されます</p>
                    </div>
                    <div id="detail-content" hidden>
                        <div id="detail-header">
                            <div id="detail-thumbnail"></div>
                            <div id="detail-title-block">
                                <div id="detail-genre"></div>
                                <h2 id="detail-title"></h2>
                                <div id="detail-author"></div>
                                <div id="detail-meta"></div>
                            </div>
                        </div>
                        <p id="detail-summary"></p>
                        <div id="detail-tags"></div>
                        <button id="detail-read-btn">この作品を読む →</button>
                    </div>
                </aside>

                <!-- 右：タグフィルター -->
                <div id="tag-filter-column">
                    <div id="tag-filter-header">
                        <span id="tag-filter-title">タグで絞り込む</span>
                        <div class="tag-filter-header-actions">
                            <button id="tag-clear-btn" hidden>クリア</button>
                            <button id="filter-close-btn">✕</button>
                        </div>
                    </div>
                    <div id="tag-filter"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="js/app.js?v=4"></script>
</body>

</html>
