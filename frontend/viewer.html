<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青空文庫リーダー</title>
    <link rel="stylesheet" href="viewer.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- コントロールバー -->
    <div class="controls-bar">
        <button id="back-button" onclick="window.history.back();">↩ 戻る</button>
        <button id="btn-next">← 次ページ</button>
        <div class="page-jump-container">
            <input type="number" id="page-input" min="1" value="1" title="ページ番号を入力してEnterで移動">
            <span id="page-total"> / -</span>
        </div>
        <button id="btn-prev">前ページ →</button>
        <button id="btn-toggle-mode">単一表示切替</button>
    </div>

    <!-- 画面全体 -->
    <div class="screen-container">
        <!-- 本の額縁 -->
        <div class="book-frame">
            <!-- 紙（白背景と余白） -->
            <div class="page-paper">
                <div class="page-right">
                    <div id="page-title-right" class="page-title"></div>
                    <div class="text-window">
                        <div class="text-container"></div>
                    </div>
                    <div id="page-number-right" class="page-number"></div>
                </div>
                <div class="page-left">
                    <div id="page-title-left" class="page-title"></div>
                    <div class="text-window">
                        <div class="text-container"></div>
                    </div>
                    <div id="page-number-left" class="page-number"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="viewer.js"></script>
</body>

</html>
