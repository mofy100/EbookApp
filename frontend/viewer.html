<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青空文庫リーダー</title>
    <link rel="stylesheet" href="viewer.css?v=1">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <main id="reader-view" class="view" style="display: flex;">
        <div class="reader-header">
            <button id="back-button" onclick="window.history.back();">← 戻る</button>
            <h2 id="reader-title">本を読み込み中...</h2>
        </div>
        
        <div id="reader-container" class="reader-container">
            <div id="reader-content" class="vertical-text">
                <!-- ここにAPIから取得した parsed.html (データ本体) が挿入されます -->
            </div>
        </div>
    </main>

    <script src="viewer.js?v=3"></script>
</body>
</html>
